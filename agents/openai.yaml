interface:
  display_name: "Hatch Clawmate"
  short_description: "Create Codex-compatible animated clawmate spritesheets"
  default_prompt: "Create a Codex-compatible animated clawmate from a concept, reference images, or both. Infer missing names/descriptions, use $imagegen for the base and grounded row strips, generate running-right before deciding whether running-left can be safely mirrored, then use this skill's deterministic scripts to ingest outputs, validate frames, assemble the spritesheet, and package the clawmate under ${CODEX_HOME:-$HOME/.codex}/pets/<pet-name>/."
